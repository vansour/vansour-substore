name: preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      can_publish: ${{ steps.meta.outputs.can_publish }}
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Compute preview metadata
        id: meta
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          pr_number="${{ github.event.pull_request.number }}"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          image_name="ghcr.io/${owner}/${repo}"
          image_ref="${image_name}:pr-${pr_number}-${short_sha}"

          can_publish=false
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${GITHUB_REPOSITORY}" ]; then
            can_publish=true
          fi

          {
            echo "can_publish=${can_publish}"
            echo "image_ref=${image_ref}"
          } >> "${GITHUB_OUTPUT}"

  build-preview-image:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ !github.event.pull_request.draft && needs.prepare.outputs.can_publish == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ needs.prepare.outputs.image_ref }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  comment-preview:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-preview-image
    if: ${{ always() && github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Update preview PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- submora-preview -->";
            const bodyLines = [marker, "## Preview"];

            const isDraft = context.payload.pull_request.draft;
            const canPublish = "${{ needs.prepare.outputs.can_publish }}" === "true";
            const imageRef = "${{ needs.prepare.outputs.image_ref }}";
            const buildResult = "${{ needs.build-preview-image.result }}";

            if (isDraft) {
              bodyLines.push("Draft PR. Preview image is not built until the PR is ready for review.");
            } else if (!canPublish) {
              bodyLines.push("Preview image skipped because this PR comes from a fork.");
            } else if (buildResult !== "success") {
              bodyLines.push("Preview image build did not complete successfully. Check the `preview` workflow run.");
            } else {
              bodyLines.push(`Image: \`${imageRef}\``);
              bodyLines.push(`Commit: \`${context.sha.slice(0, 12)}\``);
              bodyLines.push("Preview image was published. No preview server deployment is configured.");
            }

            const body = bodyLines.join("\n\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
